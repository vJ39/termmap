name: CI

# push と pull_request の両方で CI を回す
on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Ubuntu: ビルド/テストはブロッキング、fmt/clippy は報告のみ(このリポは意図的に非rustfmtの密スタイル)
  ubuntu:
    name: Ubuntu (fmt, build, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          # key は Cargo.lock のハッシュ。OS 別にキャッシュを分ける
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # 整形差分は報告のみ(ブロックしない)。整形を入れる決断をしたら --check をブロッキング化
      - name: Format check (report only)
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test (all targets)
        run: cargo test --all-targets --locked

      - name: Test (release)
        run: cargo test --release --locked

      # clippy は現状 warning が残りうるので報告のみ(緑にできたら -D warnings でブロック化)
      - name: Clippy (report only)
        continue-on-error: true
        run: cargo clippy --all-targets

  # macOS: ビルド + テストのみ
  macos:
    name: macOS (build, test)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test (all targets)
        run: cargo test --all-targets --locked

      - name: Test (release)
        run: cargo test --release --locked
